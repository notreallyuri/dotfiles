# Example windowrule


windowrule {
  name = "maximize_ignore"
  match:class = .*
  suppress_event = maximize
}

windowrule {
  name = "xwayland-drag-fix"
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
  no_focus = on
}

layerrule {
  name = no_anim_for_selection
  match:namespace = noctalia-shell:regionSelector
  no_anim = on
}

# noctalia-shell

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}


# Special workspaces

windowrule {
  name = "special_workspace_comm"
  match:class = ^(discord|whatsapp|vesktop)$
  workspace = special:comm
}

windowrule {
  name = "special_workspace_music"
  match:class = ^(Cider|spotify)$
  workspace = special:music
}

windowrule {
  name = "special_workspace_browser"
  match:class = ^(zen|firefox|chromium)$
  workspace = special:browser
}

# Special visual rules

windowrule {
  name = "fix_share_picker"
  match:class = ^(hyprland-share-picker)$
  workspace = unset           
  float = on
  center = on
  border_color = rgb(ff5555)
}

windowrule {
  name = "opaque"
  match:class = ^(discord|krita)$
  opacity = 1.0 override 1.0 override
}

windowrule {
  name = "imv_style"
  match:class = ^(imv)$
  float = on
  center = on
  size = 800 600
}

windowrule {
  name = "zen_transparency"
  match:class = ^(zen)$
  opacity = 0.99999 override
}

# Steam specific

windowrule {
  name = "steam_no_rounding_menus"
  match:class = ^(steam)$
  match:xwayland = 1
  match:float = 1
  match:title = ^$
  rounding = 0
}

windowrule {
  name = "steam_no_rounding_notifications"
  match:class = ^(steam)$
  match:float = 1
  match:title = ^notificationtoasts_[0-9]+_desktop$
  rounding = 0
}

windowrule {
  name = "steam_friend_list_fix"
  match:class = ^(steam)$
  match:title = ^(Friends List)$
  float = 1
  size = 300 600
  center = 1
}

windowrule {
  name        = "steam_settings_fix"
  match:class = ^(steam)$
  match:title = ^(Steam Settings)$
  float       = 1
  size        = 1000 800
  center      = 1
}

windowrule {
  name = "steam_rs"
  match:class = ^(steam)$
  match:title = ^(Recordings & Screenshots)$
  float = 1
  size= 1280 720
}

## Even more Steam specific

windowrule {
  name = "tag_games_classes"
  match:class = ^(gamescope|steam_proton|retroarch|steam_app_\d+|HytaleClient)$
  tag = games
}

windowrule {
  name = "tag_games_titles"
  match:title = ^(Minecraft.*)$
  tag = games
}

windowrule {
  name = "tag_games_exe"
  match:class = ^(.*\.exe)$
  match:title = ^(.+)$
  tag = games
}

windowrule {
  name = "apply_games_rules"
  match:tag = games
  workspace = 5
  no_blur = on
  fullscreen = on
}

windowrule {
  name = "elsword_fix"
  match:class = ^(steam_app_0)$
  match:title = ^$
  no_focus = on
}
