### System ###
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

### Keyring and auth ###
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

### Display Order Fix ###
exec-once = xrandr --output DP-1 --primary

### Interface & background ###
exec-once = hyprctl setcursor Bibata-Original-Classic 24
exec-once = qs -c noctalia-shell

### Media Control ###
exec-once = mpris-proxy &

### Applications ###
exec-once = [workspace special:comm silent] discord &
exec-once = [workspace special:music silent] cider &
exec-once = [workspace special:browser silent] zen-browser &
