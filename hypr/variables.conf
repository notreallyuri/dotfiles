# ### Apps ###
$terminal     = kitty
$browser      = zen-browser
$filemgr      = thunar
$menu         = hyprlauncher
$editor       = nvim
$colorpicker  = hyprpicker
$lock         = hyprlock

# ### Data ###
# Images
$wallpaper  = $HOME/.config/hypr/data/winpp.jpg
$wallpaper2 = $HOME/.config/hypr/data/mikupp.png
$pfp        = /var/lib/AccountsService/icons/$USER

# Text
$anifile = $HOME/.config/hypr/data/anitext

# ### Keybinds ###
# Workspaces
$kbMoveWin    = Super+Shift
$kbGoTo       = Super

# Special Workspaces
$kbCommunication  = Super, D
$kbMusic = Super, M

# Window Management
$kbWinFloatToggle  = Super, Space
$kbWinFullscreen   = Super, F
$kbCloseWin        = Super, C
$kbToggleSplit     = Super, J

$msMoveWin         = Super, mouse:272
$msResizeWin       = Super, mouse:273
$kbWinResize       = Super, Alt

# Apps
$kbTerminal = Super, Q
$kbBrowser  = Super, B
$kbFileMgr  = Super, E
$kbMenu     = Super, R

